<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Glass Gallery</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="header">
    <h1>Visual Gallery</h1>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="nature">Nature</button>
        <button class="filter-btn" data-filter="urban">Urban</button>
        <button class="filter-btn" data-filter="animals">Animals</button>
        <button class="filter-btn" data-filter="birds">Birds</button>
        <button class="filter-btn" data-filter="travel">Travel</button>
        <button class="filter-btn" data-filter="space">Space</button>
        <button class="filter-btn" data-filter="food">Food</button>
    </div>
</div>

<div class="gallery-grid">

    <!-- Item -->
    <div class="gallery-item nature">
        <img src="/Images/Mountain.jpg">
        <div class="overlay">
            <p>Nature</p>
            <h3>Mountain</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item urban">
        <img src="/Images/Road.jpeg">
        <div class="overlay">
            <p>Urban</p>
            <h3>City</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>
    
    <div class="gallery-item food">
        <img src="/Images/snack.jpeg">
        <div class="overlay">
            <p>Food</p>
            <h3>Snack</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item nature">
        <img src="/Images/Bridge.jpg">
        <div class="overlay">
            <p>Nature</p>
            <h3>Bridge</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item animals">
        <img src="/Images/Dog.jpg">
        <div class="overlay">
            <p>Animals</p>
            <h3>Dog</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item birds">
        <img src="/Images/Peacock.jpg">
        <div class="overlay">
            <p>Birds</p>
            <h3>Peacock</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item space">
        <img src="/Images/planets.jpg">
        <div class="overlay">
            <p>Space</p>
            <h3>Planets</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item food">
        <img src="/Images/food.jpeg">
        <div class="overlay">
            <p>Food</p>
            <h3>Food</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item travel">
        <img src="/Images/beach.jpeg">
        <div class="overlay">
            <p>Travel</p>
            <h3>Beach</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>
    <div class="gallery-item nature">
        <img src="/Images/Lake.jpg">
        <div class="overlay">
            <p>Nature</p>
            <h3>Lake</h3>

                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item space">
        <img src="/Images/Satellite.jpeg">
        <div class="overlay">
            <p>Space</p>
            <h3>Galaxy</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item animals">
        <img src="/Images/cat.jpg">
        <div class="overlay">
            <p>Animals</p>
            <h3>Cat</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item bird">
        <img src="/Images/kingfisher.jpg">
        <div class="overlay">
            <p>Bird</p>
            <h3>Kingfisher</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item travel">
        <img src="/Images/plane.jpg">
        <div class="overlay">
            <p>Travel</p>
            <h3>Plane</h3>
            <div class="icons">

                <i class="fa-solid fa-download download"></i>

    </div>

    <div class="gallery-item space">
        <img src="/Images/universe.jpg">
        <div class="overlay">
            <p>Space</p>
            <h3>Universe</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

    <div class="gallery-item urban">
        <img src="/Images/building.jpg">
        <div class="overlay">
            <p>Travel</p>
            <h3>Buildings</h3>
            <div class="icons">
                <i class="fa-solid fa-heart like"></i>
                <i class="fa-solid fa-download download"></i>
            </div>
        </div>
    </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>

    <img id="lightbox-img">
    <h2 id="lightbox-title"></h2>

    <button class="prev">❮</button>
    <button class="next">❯</button>
</div>

<script src="script.js"></script>
</body>
</html>
